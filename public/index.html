<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- 🔥 VIEWPORT + PERFORMANCE -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- 🎯 PRIMARY SEO -->
  <title>Poeage Groups | Building the Future Across Industries</title>
  <meta name="description" content="Poeage Groups is a multi-industry company delivering scalable solutions in technology, infrastructure, consulting, and enterprise services." />
  <meta name="keywords" content="Poeage Groups, Technology, Infrastructure, Consulting, IT Services, Enterprise Solutions, Business India" />
  <meta name="author" content="Poeage Groups" />

  <!-- 🧠 ADVANCED SEO -->
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta name="googlebot" content="index, follow" />
  <meta name="bingbot" content="index, follow" />

  <!-- 🌍 GEO -->
  <meta name="geo.region" content="IN" />
  <meta name="geo.placename" content="India" />
  <meta name="distribution" content="global" />

  <!-- 🔗 CANONICAL -->
  <link rel="canonical" href="https://poeage.com/" />

  <!-- 🌐 OPEN GRAPH -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Poeage Groups | Multi-Industry Innovation" />
  <meta property="og:description" content="Building scalable businesses across industries with innovation and execution excellence." />
  <meta property="og:url" content="https://poeage.com/" />
  <meta property="og:image" content="%PUBLIC_URL%/logo192.png" />
  <meta property="og:site_name" content="Poeage Groups" />

  <!-- 🐦 TWITTER -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Poeage Groups | Multi-Industry Innovation" />
  <meta name="twitter:description" content="Multi-industry enterprise solutions for future-ready businesses." />
  <meta name="twitter:image" content="%PUBLIC_URL%/logo192.png" />

  <!-- ⚡ PERFORMANCE BOOST -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
  <link rel="dns-prefetch" href="https://www.google-analytics.com" />

  <!-- 🔤 FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet" />

  <!-- 🖼 ICONS -->
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico.png" />

  <!-- 🎨 THEME -->
  <meta name="theme-color" content="#1e40af" />
  <meta name="msapplication-TileColor" content="#1e40af" />

  <!-- 📦 PWA -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- 🔐 SECURITY (ADVANCED) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval';" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />

  <!-- 📊 GOOGLE VERIFICATION -->
  <meta name="google-site-verification" content="YOUR_GOOGLE_CODE" />

  <!-- 🧠 STRUCTURED DATA: ORGANIZATION -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Poeage Groups",
    "url": "https://poeage.com",
    "logo": "https://poeage.com/logo.png",
    "description": "Multi-industry enterprise delivering solutions in technology, infrastructure, and consulting.",
    "sameAs": [
      "https://www.linkedin.com/",
      "https://www.instagram.com/",
      "https://www.facebook.com/"
    ]
  }
  </script>

  <!-- 🧠 STRUCTURED DATA: WEBSITE -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Poeage Groups",
    "url": "https://poeage.com",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://poeage.com/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>

  <!-- ⚛️ ROOT -->
  <div id="root"></div>

  <!-- 🔥 GOOGLE TAG MANAGER -->
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXX"
      height="0" width="0" style="display:none;visibility:hidden">
    </iframe>
  </noscript>

</body>
</html>
